<div
  id="search-container"
  class="fixed inset-0 bg-slate-900/25 backdrop-blur transition-opacity w-screen h-screen hidden flex z-50 items-start justify-center pt-16 sm:pt-24"
>
  <div class="w-full max-w-xl px-4">
    <!-- Search Bar -->
    <div
      class="flex items-center gap-3 px-4 py-3 rounded-xl bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 shadow-lg"
    >
      <i class="fa-solid fa-magnifying-glass text-neutral-400"></i>
      <input
        id="search-input"
        type="text"
        class="flex-1 bg-transparent outline-none text-sm dark:text-neutral-100 placeholder:text-neutral-400"
        placeholder="Type to search..."
        aria-label="Search input"
      />
      <button onclick="clearSearch()">
        <i class="fa-solid fa-xmark text-neutral-500"></i>
      </button>
    </div>

    <!-- Results Panel -->
    <div
      id="results-container"
      class="mt-2 rounded-xl overflow-hidden bg-white dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 shadow-lg hidden"
    >
      <!-- SimpleJekyllSearch will populate <ul> -->
      <ul class="py-1.5 no-scrollbar"></ul>
    </div>
  </div>
</div>

<script>
  function clearSearch() {
    const searchInput = document.getElementById("search-input");
    const resultsContainer = document.getElementById("results-container");
    searchInput.value = "";
    resultsContainer.classList.add("hidden");
    resultsContainer.querySelector("ul").innerHTML = "";
  }

  document.addEventListener("DOMContentLoaded", () => {
    const searchInput = document.getElementById("search-input");
    const resultsContainer = document.getElementById("results-container");
    const searchContainer = document.getElementById("search-container");
    const searchIcon = document.getElementById("search-icon");

    if (searchIcon) {
      searchIcon.addEventListener("click", () => {
        searchContainer.classList.remove("hidden");
        searchIcon.classList.add("hidden");
        searchInput.focus();
      });
    }

    // Initialize SimpleJekyllSearch
    SimpleJekyllSearch({
      searchInput: searchInput,
      resultsContainer: resultsContainer.querySelector("ul"),
      searchResultTemplate: `
      <li class="flex items-start gap-3 p-2 hover:bg-neutral-100 dark:hover:bg-neutral-700 rounded-lg cursor-pointer">
        <a href="{url}" class="flex-1 flex items-start gap-3">
          <img src="{image}" alt="{title}" class="w-12 h-12 rounded object-cover flex-shrink-0">
          <div class="flex flex-col">
            <p class="text-sm font-bold text-neutral-800 dark:text-neutral-100 truncate">{title}</p>
            <p class="text-sm text-neutral-500 dark:text-neutral-400 truncate">{description}</p>
          </div>
        </a>
      </li>
    `,
      noResultsText: `<li class='px-4 py-6 text-center text-neutral-400'>No results found</li>`,
      json: "{{ site.baseurl }}/assets/search.json",
    });

    // Show/hide results container dynamically
    searchInput.addEventListener("input", () => {
      resultsContainer.classList.toggle("hidden", !searchInput.value.trim());
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        clearSearch();
        searchContainer.classList.add("hidden");
        if (searchIcon) searchIcon.classList.remove("hidden");
      }
    });
  });
</script>
