{% include search.html %}
<div class="sticky top-3 z-10 px-3 sm:px-6">
<nav
  class="max-w-7xl mx-auto bg-white/80 dark:bg-neutral-800/80 backdrop-blur-md border border-neutral-200/70 dark:border-neutral-700/60 shadow-md shadow-neutral-900/5 dark:shadow-neutral-900/30 rounded-2xl"
>
  <div id="lights" class="hidden"></div>
  <div class="px-4 sm:px-6">
    <div class="relative flex h-14 items-center justify-between">
      <div class="flex justify-center sm:items-stretch sm:justify-start">
        <a href="{{ site.baseurl }}/" class="flex shrink-0 items-center">
          <img
            class="h-8 w-auto"
            src="{{ site.baseurl }}/assets/img/logo.png"
          />
          <p class="ml-4 dark:text-gray-100 font-bold">Beaver Blog</p>
        </a>
      </div>
      <!-- Search Icon Button -->
      <button
        onclick="openSearch()"
        class="text-neutral-100 p-2 rounded-lg hover:bg-amber-400 hover:bg-opacity-10 flex items-center justify-center ml-auto"
      >
        <i
          class="fa-solid fa-magnifying-glass text-gray-600 dark:text-neutral-100 hover:text-amber-400"
        ></i>
      </button>

      <!-- Dark Mode Toggle Button -->
      <button
        id="dark-mode-toggle"
        class="text-neutral-100 p-2 rounded-lg hover:bg-amber-400 hover:bg-opacity-10 flex items-center justify-center ml-4"
        onclick="toggleDarkMode()"
      >
        <i
          id="dark-mode-icon"
          class="fa-solid fa-moon text-gray-600 dark:text-neutral-100"
        ></i>
      </button>
    </div>
  </div>
  <script>
    function toggleDarkMode() {
      const html = document.documentElement;
      const icon = document.getElementById("dark-mode-icon");

      // Toggle dark class and update icon
      if (html.classList.contains("dark")) {
        html.classList.remove("dark");
        icon.classList.remove("fa-sun");
        icon.classList.add("fa-moon");
        localStorage.setItem("theme", "light");
      } else {
        html.classList.add("dark");
        icon.classList.remove("fa-moon");
        icon.classList.add("fa-sun");
        localStorage.setItem("theme", "dark");
      }
    }

    // Apply dark mode based on saved preference or system setting
    document.addEventListener("DOMContentLoaded", () => {
      const html = document.documentElement;
      const icon = document.getElementById("dark-mode-icon");
      const savedTheme = localStorage.getItem("theme");
      const systemPrefersDark = window.matchMedia(
        "(prefers-color-scheme: dark)",
      ).matches;

      if (savedTheme) {
        // Apply saved theme
        if (savedTheme === "dark") {
          html.classList.add("dark");
          icon.classList.add("fa-sun");
          icon.classList.remove("fa-moon");
        } else {
          html.classList.remove("dark");
          icon.classList.add("fa-moon");
          icon.classList.remove("fa-sun");
        }
      } else {
        // Apply system preference
        if (systemPrefersDark) {
          html.classList.add("dark");
          icon.classList.add("fa-sun");
          icon.classList.remove("fa-moon");
        } else {
          html.classList.remove("dark");
          icon.classList.add("fa-moon");
          icon.classList.remove("fa-sun");
        }
      }

      // Update theme dynamically if the system preference changes
      window
        .matchMedia("(prefers-color-scheme: dark)")
        .addEventListener("change", (e) => {
          if (!localStorage.getItem("theme")) {
            if (e.matches) {
              html.classList.add("dark");
              icon.classList.add("fa-sun");
              icon.classList.remove("fa-moon");
            } else {
              html.classList.remove("dark");
              icon.classList.add("fa-moon");
              icon.classList.remove("fa-sun");
            }
          }
        });
    });

    function openSearch() {
      const searchContainer = document.getElementById("search-container");
      if (searchContainer) {
        searchContainer.classList.remove("hidden");
      } else {
        console.error("Search container not found");
      }
    }

    // Add event listener for keydown
    document.addEventListener("keydown", (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "k") {
        event.preventDefault(); // Prevent default browser action
        openSearch();
      }
    });
  </script>
</nav>
</div>
